<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
      user-select: none;
    }
    .logo { font-size: 2rem; font-weight: 800; color: #3b82f6; margin-bottom: 1rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e3a5f;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 0.9rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="logo">KineTube</div>
  <div class="spinner"></div>
  <div class="msg">Starting backend…</div>
</body>
</html>
